name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  smart-contracts:
    name: Build & Test Soroban Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32v1-none

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Compile Contracts (WASM)
        run: |
          cargo rustc -p campaign_escrow --crate-type cdylib --target wasm32v1-none --release
          cargo rustc -p campaign_factory --crate-type cdylib --target wasm32v1-none --release

      - name: Run Contract Tests
        run: cargo test

  frontend:
    name: Build & Lint Next.js App
    runs-on: ubuntu-latest
    needs: smart-contracts

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build Next.js Application
        run: npm run build
